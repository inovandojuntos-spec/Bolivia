<!doctype html>
<html lang="es-BO">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DSANT · Panel de ventas</title>
<meta name="robots" content="noindex, nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{--ink:#2b2530;--muted:#7d7383;--gold:#b98a2f;--rose:#d98fa4;--line:#eee6ec;--bg:#faf7f9;--ok:#3f9d6c;--danger:#c9534f}
*{box-sizing:border-box}
body{margin:0;font-family:Jost,sans-serif;font-weight:300;background:var(--bg);color:var(--ink)}
h1,h2{font-family:"Cormorant Garamond",serif;margin:0}
.wrap{max-width:1080px;margin:0 auto;padding:24px 18px 80px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.logo{font-family:"Cormorant Garamond",serif;font-size:1.6rem;letter-spacing:.3em}
.logo b{color:var(--gold)}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 20px;cursor:pointer;font-family:Jost;font-size:.88rem}
.tab.on{background:var(--gold);border-color:var(--gold);color:#fff}
.panel{display:none}.panel.on{display:block}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:.9rem}
th{background:#fff;font-weight:500;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
.kpi .v{font-family:"Cormorant Garamond",serif;font-size:2rem;color:var(--gold);font-weight:600}
.kpi .l{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
select,input{border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-family:Jost;font-size:.85rem;background:#fff}
input.stock{width:70px}
button.save{background:var(--rose);color:#fff;border:none;border-radius:999px;padding:7px 16px;cursor:pointer;font-family:Jost;font-size:.8rem}
.status-nuevo{color:var(--gold)}.status-confirmado{color:#3a7bd5}.status-enviado{color:#8e63c5}.status-entregado{color:var(--ok)}.status-cancelado{color:var(--danger)}
.low{color:var(--danger);font-weight:500}
.login{max-width:460px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px;text-align:center}
.login input{width:100%;margin:14px 0}
.login button{background:var(--gold);color:#fff;border:none;border-radius:999px;padding:12px 30px;cursor:pointer;font-family:Jost;letter-spacing:.08em}
.hint{font-size:.8rem;color:var(--muted)}
.items-mini{font-size:.8rem;color:var(--muted)}
.msg{color:var(--danger);font-size:.85rem;min-height:1.2em}
.logout{background:none;border:1px solid var(--line);border-radius:999px;padding:7px 16px;cursor:pointer;font-family:Jost;font-size:.8rem}
</style>
</head>
<body>

<div class="login" id="login">
  <h1>DSA<b style="color:var(--gold)">NT</b> · Panel</h1>
  <p class="hint">Pega tu <strong>service_role key</strong> de Supabase.<br/>La encuentras en supabase.com → proyecto <strong>dsant</strong> → Project Settings → API Keys.<br/>Se guarda solo en este navegador. No la compartas ni la subas a GitHub.</p>
  <input id="keyInput" type="password" placeholder="service_role key (eyJ… o sb_secret_…)" />
  <div class="msg" id="loginMsg"></div>
  <button id="loginBtn" type="button">Entrar</button>
</div>

<div class="wrap" id="app" hidden>
  <header>
    <div class="logo">DSA<b>NT</b> · Ventas</div>
    <button class="logout" id="logoutBtn" type="button">Salir</button>
  </header>

  <div class="kpis" id="kpis"></div>

  <div class="tabs">
    <button class="tab on" data-p="orders" type="button">Pedidos</button>
    <button class="tab" data-p="stock" type="button">Stock</button>
    <button class="tab" data-p="coupons" type="button">Raspaditas</button>
    <button class="tab" data-p="citas" type="button">Citas</button>
  </div>

  <div class="panel on" id="p-orders"></div>
  <div class="panel" id="p-stock"></div>
  <div class="panel" id="p-coupons"></div>
  <div class="panel" id="p-citas"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = "https://lrdefhubzhflcrshonhx.supabase.co";
const fmt = n => "Bs " + Number(n).toLocaleString("es-BO");
let db = null;

function connect(key){ db = supabase.createClient(SUPABASE_URL, key, { auth:{ persistSession:false } }); }

async function tryLogin(key){
  connect(key);
  const { error } = await db.from("orders").select("id", { count:"exact", head:true });
  if (error) throw error;
  localStorage.setItem("dsant_admin_key", key);
  document.getElementById("login").hidden = true;
  document.getElementById("app").hidden = false;
  refresh();
}

document.getElementById("loginBtn").onclick = async ()=>{
  const k = document.getElementById("keyInput").value.trim();
  if (!k) return;
  try { await tryLogin(k); }
  catch(e){ document.getElementById("loginMsg").textContent = "Key inválida o sin permisos."; }
};
document.getElementById("logoutBtn").onclick = ()=>{ localStorage.removeItem("dsant_admin_key"); location.reload(); };

document.querySelectorAll(".tab").forEach(t=>t.onclick = ()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on", x===t));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("on", p.id==="p-"+t.dataset.p));
});

async function refresh(){
  const [orders, variants, coupons, citas] = await Promise.all([
    db.from("orders").select("*").order("created_at",{ascending:false}).limit(200),
    db.from("variants").select("id,color,size,stock,products(name,price_bs)").order("product_id"),
    db.from("discount_codes").select("*").order("created_at",{ascending:false}).limit(200),
    db.from("appointments").select("*").order("starts_at",{ascending:true}).limit(300),
  ]);

  // KPIs
  const os = orders.data||[];
  const active = os.filter(o=>o.status!=="cancelado");
  const totalVentas = active.reduce((a,o)=>a+Number(o.total_bs),0);
  const stockTotal = (variants.data||[]).reduce((a,v)=>a+v.stock,0);
  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><div class="v">${os.length}</div><div class="l">Pedidos</div></div>
    <div class="kpi"><div class="v">${fmt(totalVentas)}</div><div class="l">Ventas (sin cancelados)</div></div>
    <div class="kpi"><div class="v">${os.filter(o=>o.status==="nuevo").length}</div><div class="l">Pedidos nuevos</div></div>
    <div class="kpi"><div class="v">${stockTotal}</div><div class="l">Unidades en stock</div></div>
    <div class="kpi"><div class="v">${(citas.data||[]).filter(c=>c.status==="pendiente").length}</div><div class="l">Citas pendientes</div></div>`;

  // Pedidos
  const statuses = ["nuevo","confirmado","enviado","entregado","cancelado"];
  document.getElementById("p-orders").innerHTML = os.length ? `
    <table><thead><tr><th>#</th><th>Fecha</th><th>Clienta</th><th>Ciudad</th><th>Items</th><th>Total</th><th>Desc.</th><th>Estado</th></tr></thead>
    <tbody>${os.map(o=>`
      <tr>
        <td>${o.id}</td>
        <td>${new Date(o.created_at).toLocaleString("es-BO",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</td>
        <td>${o.customer_name}${o.customer_phone?`<br/><span class="items-mini">${o.customer_phone}</span>`:""}</td>
        <td>${o.customer_city||""}</td>
        <td class="items-mini">${(o.items||[]).map(i=>`${i.name} ${i.color} ${i.size} ×${i.qty}`).join("<br/>")}</td>
        <td><strong>${fmt(o.total_bs)}</strong></td>
        <td>${o.discount_percent?o.discount_percent+"%":"—"}</td>
        <td><select data-order="${o.id}" class="status-${o.status}">
          ${statuses.map(s=>`<option ${s===o.status?"selected":""}>${s}</option>`).join("")}
        </select></td>
      </tr>`).join("")}</tbody></table>`
    : `<div class="card">Todavía no hay pedidos.</div>`;
  document.querySelectorAll("[data-order]").forEach(sel=>sel.onchange = async ()=>{
    await db.from("orders").update({ status: sel.value }).eq("id", sel.dataset.order);
    refresh();
  });

  // Stock
  document.getElementById("p-stock").innerHTML = `
    <table><thead><tr><th>Producto</th><th>Color</th><th>Talla</th><th>Precio</th><th>Stock</th><th></th></tr></thead>
    <tbody>${(variants.data||[]).map(v=>`
      <tr>
        <td>${v.products.name}</td><td>${v.color}</td><td>${v.size==="U"?"Única":v.size}</td>
        <td>${fmt(v.products.price_bs)}</td>
        <td class="${v.stock<=3?"low":""}"><input class="stock" type="number" min="0" value="${v.stock}" data-var="${v.id}" /></td>
        <td><button class="save" data-savevar="${v.id}" type="button">Guardar</button></td>
      </tr>`).join("")}</tbody></table>`;
  document.querySelectorAll("[data-savevar]").forEach(b=>b.onclick = async ()=>{
    const val = Number(document.querySelector(`input[data-var="${b.dataset.savevar}"]`).value);
    await db.from("variants").update({ stock: val }).eq("id", b.dataset.savevar);
    b.textContent = "✓"; setTimeout(()=>b.textContent="Guardar", 1200);
    refresh();
  });

  // Raspaditas
  const cs = coupons.data||[];
  document.getElementById("p-coupons").innerHTML = `
    <div class="card">Generadas: <strong>${cs.length}</strong> · Usadas: <strong>${cs.filter(c=>c.used).length}</strong></div>
    <table><thead><tr><th>Código</th><th>%</th><th>Creada</th><th>Vence</th><th>Estado</th></tr></thead>
    <tbody>${cs.map(c=>`
      <tr><td>${c.code}</td><td>${c.percent}%</td>
      <td>${new Date(c.created_at).toLocaleDateString("es-BO")}</td>
      <td>${new Date(c.expires_at).toLocaleDateString("es-BO")}</td>
      <td>${c.used?"✅ usada":(new Date(c.expires_at)<new Date()?"⌛ vencida":"🎁 activa")}</td></tr>`).join("")}</tbody></table>`;

  // Citas (prueba en casa, turnos de 15 min)
  const cts = citas.data||[];
  const citaStatuses = ["pendiente","confirmada","realizada","cancelada"];
  const boliviaTime = t => new Date(t).toLocaleString("es-BO",{timeZone:"America/La_Paz",weekday:"short",day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
  document.getElementById("p-citas").innerHTML = cts.length ? `
    <div class="card">⏱ Cada cita dura <strong>15 minutos</strong>. Contacta a la clienta para confirmar.</div>
    <table><thead><tr><th>#</th><th>Turno</th><th>Clienta</th><th>Contacto</th><th>Vestido</th><th>Cant.</th><th>Estado</th></tr></thead>
    <tbody>${cts.map(c=>`
      <tr>
        <td>${c.id}</td>
        <td><strong>${boliviaTime(c.starts_at)}</strong></td>
        <td>${c.customer_name}</td>
        <td>${c.contact_type==="whatsapp"
            ? `<a href="https://wa.me/${c.contact.replace(/\D/g,"")}" target="_blank">📱 ${c.contact}</a>`
            : `<a href="mailto:${c.contact}">✉️ ${c.contact}</a>`}</td>
        <td>${c.product_name}</td>
        <td>${c.qty}</td>
        <td><select data-cita="${c.id}" class="status-${c.status}">
          ${citaStatuses.map(s=>`<option ${s===c.status?"selected":""}>${s}</option>`).join("")}
        </select></td>
      </tr>`).join("")}</tbody></table>`
    : `<div class="card">Todavía no hay citas agendadas.</div>`;
  document.querySelectorAll("[data-cita]").forEach(sel=>sel.onchange = async ()=>{
    await db.from("appointments").update({ status: sel.value }).eq("id", sel.dataset.cita);
    refresh();
  });
}

const saved = localStorage.getItem("dsant_admin_key");
if (saved) tryLogin(saved).catch(()=>localStorage.removeItem("dsant_admin_key"));
</script>
</body>
</html>
